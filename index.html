  <style>
    /* Absolute aesthetic enhancements */
    @keyframes fadeInDown {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    .animate-fade-in-down {
      opacity: 0;
      animation: fadeInDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-fade-in-up {
      opacity: 0;
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-fade-in {
      opacity: 0;
      animation: fadeIn 1.5s ease-out forwards;
    }

    .text-readable-shadow {
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.85), 0 2px 6px rgba(0, 0, 0, 0.6);

      background: #000;

    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    /* Refined Mobile Scrollbar - extremely thin, dark/black, almost invisible */
    @media (max-width: 768px) {
      html {
        scroll-behavior: smooth;
      }
      ::-webkit-scrollbar {
        width: 3px !important;
        height: 3px !important;
      }
      ::-webkit-scrollbar-track {
        background: transparent !important;
      }
      ::-webkit-scrollbar-thumb {
        background: #111111 !important;
        border-radius: 9999px !important;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #000000 !important;

  <!-- Interactivity for the Global Region Selector exactly as required -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const topTrigger = document.getElementById("top-global-trigger");
      const mainTrigger = document.getElementById("globe-trigger");
      const dropdown = document.getElementById("globe-dropdown");
      const tabs = document.querySelectorAll(".region-tab");
      const grid = document.getElementById("countries-grid");

      let dropdownOpen = false;
      let hoverTimeout = null;

      // Country lists for each region structured for a clean 4-column layout
      const countryData = {
        america: [
          ["Argentina", "Chile", "Ecuador", "Panama", "The Bahamas"],
          ["Brazil", "Colombia", "El Salvador", "Paraguay", "Uruguay"],
          ["Bolivia", "Costa Rica", "Guatemala", "Peru"],
          ["Caribbean Region", "Dominican Republic", "Mexico", "The United States"]
        ],
        europe: [
          ["Austria", "Belgium", "Denmark", "Finland"],
          ["France", "Germany", "Ireland", "Italy"],
          ["Netherlands", "Norway", "Portugal", "Spain"],
          ["Sweden", "Switzerland", "United Kingdom", "Turkey"]
        ],
        asiapacific: [
          ["Australia", "China", "India", "Indonesia"],
          ["Japan", "Malaysia", "New Zealand", "Philippines"],
          ["Singapore", "South Korea", "Thailand", "Vietnam"],
          ["Cambodia", "Laos", "Nepal", "Bangladesh"]
        ],
        middleeastafrica: [
          ["Israel", "Jordan", "Kuwait", "Lebanon"],
          ["Oman", "Qatar", "Saudi Arabia", "UAE"],
          ["Egypt", "Morocco", "Kenya", "South Africa"],
          ["Bahrain", "Mauritius", "Nigeria", "Tunisia"]
        ],
        other: [
          ["Global Channel Partners", "International Fleet"],
          ["Overseas Distributors", "Other Regions"],
          [],
          []
        ]
      };

      // Renders countries for the current region inside the 4-column grid
      function renderCountries(region) {
        if (!grid) return;
        grid.innerHTML = "";

        const cols = countryData[region] || [[], [], [], []];

        for (let colIdx = 0; colIdx < 4; colIdx++) {
          const colDiv = document.createElement("div");
          colDiv.className = "flex flex-col space-y-4";
          
          const countries = cols[colIdx] || [];
          countries.forEach(country => {
            const btn = document.createElement("a");
            btn.href = "#";
            btn.className = "country-item text-[#4a4a4a] hover:text-black font-semibold text-[15px] sm:text-[16px] tracking-wide transition-colors duration-200 py-2 block text-left focus:outline-none focus:ring-2 focus:ring-gray-400 px-2 rounded cursor-pointer";
            btn.textContent = country;

            // Clicking on a country selects it and closes the menu
            btn.addEventListener("click", (e) => {
              e.preventDefault();
              console.log(`Region Country Selected: ${country}`);
              closeDropdown();
              // Optionally refocus the trigger
              mainTrigger.focus();
            });

            colDiv.appendChild(btn);
          });
          grid.appendChild(colDiv);
        }
      }

      function openDropdown() {
        if (dropdownOpen) return;
        dropdownOpen = true;
        dropdown.classList.remove("-translate-y-4", "opacity-0", "pointer-events-none");
        dropdown.classList.add("translate-y-0", "opacity-100", "pointer-events-auto");
        mainTrigger.setAttribute("aria-expanded", "true");
        topTrigger.setAttribute("aria-expanded", "true");
      }

      function closeDropdown() {
        if (!dropdownOpen) return;
        dropdownOpen = false;
        dropdown.classList.remove("translate-y-0", "opacity-100", "pointer-events-auto");
        dropdown.classList.add("-translate-y-4", "opacity-0", "pointer-events-none");
        mainTrigger.setAttribute("aria-expanded", "false");
        topTrigger.setAttribute("aria-expanded", "false");
      }

      function toggleDropdown() {
        if (dropdownOpen) {
          closeDropdown();
        } else {
          openDropdown();
        }
      }

      // Add hover handlers to triggers
      [mainTrigger, topTrigger].forEach(trig => {
        trig.addEventListener("mouseenter", () => {
          if (hoverTimeout) clearTimeout(hoverTimeout);
          openDropdown();
        });

        trig.addEventListener("mouseleave", () => {
          hoverTimeout = setTimeout(() => {
            if (!dropdown.matches(":hover") && !mainTrigger.matches(":hover") && !topTrigger.matches(":hover")) {
              closeDropdown();
            }
          }, 150);
        });

        trig.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleDropdown();
        });
      });

      // Add hover handlers to the dropdown itself to keep it open
      dropdown.addEventListener("mouseenter", () => {
        if (hoverTimeout) clearTimeout(hoverTimeout);
      });

      dropdown.addEventListener("mouseleave", () => {
        hoverTimeout = setTimeout(() => {
          if (!mainTrigger.matches(":hover") && !topTrigger.matches(":hover")) {
            closeDropdown();
          }
        }, 150);
      });

      // Close dropdown when clicking outside
      document.addEventListener("click", (e) => {
        if (!dropdown.contains(e.target) && !mainTrigger.contains(e.target) && !topTrigger.contains(e.target)) {
          closeDropdown();
        }
      });

      // Handle Region Tab clicks
      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          tabs.forEach(t => {
            t.classList.remove("font-bold", "text-[#111111]");
            t.classList.add("font-medium", "text-gray-400", "hover:text-gray-600");
            t.setAttribute("aria-selected", "false");
          });

          tab.classList.remove("font-medium", "text-gray-400", "hover:text-gray-600");
          tab.classList.add("font-bold", "text-[#111111]");
          tab.setAttribute("aria-selected", "true");

          const region = tab.getAttribute("data-region");
          renderCountries(region);
        });
      });

      // Keyboard navigation support exactly as required
      document.addEventListener("keydown", (e) => {
        if (!dropdownOpen) return;

        if (e.key === "Escape") {
          closeDropdown();
          mainTrigger.focus();
          e.preventDefault();
          return;
        }

        const focusableTabs = Array.from(document.querySelectorAll(".region-tab"));
        const focusableCountries = Array.from(document.querySelectorAll(".country-item"));
        const activeElement = document.activeElement;

        // If a region tab is focused
        if (focusableTabs.includes(activeElement)) {
          const idx = focusableTabs.indexOf(activeElement);
          if (e.key === "ArrowRight") {
            const nextIdx = (idx + 1) % focusableTabs.length;
            focusableTabs[nextIdx].focus();
            e.preventDefault();
          } else if (e.key === "ArrowLeft") {
            const prevIdx = (idx - 1 + focusableTabs.length) % focusableTabs.length;
            focusableTabs[prevIdx].focus();
            e.preventDefault();
          } else if (e.key === "ArrowDown") {
            if (focusableCountries.length > 0) {
              focusableCountries[0].focus();
              e.preventDefault();
            }
          }
        } 
        // If a country item is focused
        else if (focusableCountries.includes(activeElement)) {
          const idx = focusableCountries.indexOf(activeElement);
          if (e.key === "ArrowDown") {
            // Move down in grid structure
            if (idx + 4 < focusableCountries.length) {
              focusableCountries[idx + 4].focus();
            }
            e.preventDefault();
          } else if (e.key === "ArrowUp") {
            if (idx - 4 >= 0) {
              focusableCountries[idx - 4].focus();
            } else {
              // Return focus to active region tab
              const activeTab = document.querySelector('.region-tab[aria-selected="true"]');
              if (activeTab) activeTab.focus();
            }
            e.preventDefault();
          } else if (e.key === "ArrowRight") {
            if (idx + 1 < focusableCountries.length) {
              focusableCountries[idx + 1].focus();
            }
            e.preventDefault();
          } else if (e.key === "ArrowLeft") {
            if (idx - 1 >= 0) {
              focusableCountries[idx - 1].focus();
            }
            e.preventDefault();
          }
        }
      });

      // Render America initially as default
      renderCountries("america");

      // Content-Aware Hero Video Focal Point Tracker for Mobile Devices
      const heroVideo = document.getElementById("hero-video");
      if (heroVideo) {
        const adjustFocalPoint = () => {
          if (window.innerWidth < 768) {
            const time = heroVideo.currentTime;
            // The interior rotating tablet/iPad scene occurs between 3.0 and 9.5 seconds of the video.
            // Shifting the focal point to 72% right preserves the tablet nicely inside the taller mobile viewport.
            if (time >= 3.0 && time <= 9.5) {
              heroVideo.style.setProperty("object-position", "72% center", "important");
            } else if (time > 9.5 && time <= 15.0) {
              // Smoothly transition to 60% right to capture detail shots
              heroVideo.style.setProperty("object-position", "60% center", "important");
            } else {
              // Keep driving shots gracefully centered
              heroVideo.style.setProperty("object-position", "50% center", "important");
            }
          } else {
            heroVideo.style.removeProperty("object-position");
          }
        };

        heroVideo.addEventListener("timeupdate", adjustFocalPoint);
        window.addEventListener("resize", adjustFocalPoint);
      }
    });
  </script>

</body>
